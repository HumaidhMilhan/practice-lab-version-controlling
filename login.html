<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f3f6fb;
            --surface: #ffffff;
            --text: #162033;
            --muted: #5d6b82;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --border: #d7deea;
            --shadow: 0 18px 40px rgba(22, 32, 51, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            font-family: Arial, sans-serif;
            color: var(--text);
            background: linear-gradient(135deg, #eef4ff 0%, var(--bg) 45%, #e8eef8 100%);
        }

        .auth-shell {
            width: 100%;
            max-width: 420px;
            padding: 28px;
            border-radius: 20px;
            background: var(--surface);
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .auth-shell h1 {
            margin: 0 0 8px;
            font-size: 2rem;
        }

        .auth-shell p {
            margin: 0 0 24px;
            color: var(--muted);
            line-height: 1.5;
        }

        form {
            display: grid;
            gap: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: var(--text);
        }

        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 12px;
            font: inherit;
            background: #fbfcfe;
            color: var(--text);
        }

        input:focus {
            outline: 3px solid rgba(37, 99, 235, 0.18);
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 12px 16px;
            border: none;
            border-radius: 12px;
            font: inherit;
            font-weight: 700;
            color: #fff;
            background: var(--primary);
            cursor: pointer;
            transition: background 0.2s ease, transform 0.2s ease;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .message {
            min-height: 1.25rem;
            margin: 0;
            color: #b91c1c;
            font-size: 0.95rem;
        }

        .hint {
            margin-top: 18px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        .hint code {
            padding: 0.15rem 0.35rem;
            border-radius: 6px;
            background: #eef2ff;
        }

        @media (max-width: 480px) {
            .auth-shell {
                padding: 22px;
                border-radius: 16px;
            }

            .auth-shell h1 {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
    <main class="auth-shell">
        <h1>Login</h1>
        <p>Sign in to continue to the homepage.</p>
        <form id="loginForm" novalidate>
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="name@example.com" required>
            </div>

            <div>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <p class="message" id="loginMessage" aria-live="polite"></p>

            <button type="submit">Log In</button>
        </form>

        <p class="hint">This demo uses <code>sessionStorage</code> to move you to <code>homepage.html</code>.</p>
    </main>

    <script>
        const loginForm = document.getElementById('loginForm');
        const loginMessage = document.getElementById('loginMessage');

        if (sessionStorage.getItem('isLoggedIn') === 'true') {
            window.location.href = 'homepage.html';
        }

        loginForm.addEventListener('submit', function (event) {
            event.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!email || !password) {
                loginMessage.textContent = 'Please enter both email and password.';
                return;
            }

            sessionStorage.setItem('isLoggedIn', 'true');
            sessionStorage.setItem('userEmail', email);
            window.location.href = 'homepage.html';
        });
    </script>
</body>
</html>
